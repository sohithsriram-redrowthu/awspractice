name: flaskapp-ci/cd
on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    build-test:
        runs-on: ubuntu-latest #Runner 
        steps:
            - name: Checkout code
              uses: actions/checkout@v2
    docker-build-push:
        runs-on: ubuntu-latest
        needs: build-test
        steps:
            - name: checkout code
              uses: actions/checkout@v3
            - name: Login to Docker
              uses: docker/Login-action@v2
              with:
                username: ${{ secrets.DOCKER_USERNAME }}
                password: ${{ secrets.DOCKER_PASSWORD }}
            - name: buildDocker image
              run: docker build -t sohithsriram/myflaskapp:${{ github.sha }} .
            - name: Docker Tag
              run: docker tag sohithsriram/myflaskapp:${{ github.sha }} sohithsriram/myflaskapp:latest
            - name: Docker Push
              run: docker push sohithsriram/myflaskapp:${{ github.sha }}
            - name : Docker push Latest
              run: docker push sohithsriram/myflaskapp:latest
    deploy:
        runs-on: ubuntu-latest
        needs: docker-build-push
        steps:
        - name: Checkout code
          uses: actions/checkout@v4

        - name: Set up kubeconfig
          run: echo "${{ secrets.KUBE_CONFIG_DATA }}" | base64 --decode > $HOME/.kube/config


        - name: Configure kubectl
          run: kubectl get nodes

        - name: Deploy to EKS
          run: kubectl apply -f k8s/deployment.yaml
